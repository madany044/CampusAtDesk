{% extends "base.html" %}

{% block title %}Create Job - Recruiter - Job Board & Career Portal{% endblock %}

{% block content %}
<h1>Create Job Posting</h1>

<div class="card">
    <div class="card-body">
        <form class="auth-form" method="POST" action="{{ url_for('recruiter_job_create') }}">
            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" name="title" value="{{ job.title if job else '' }}" required>
            </div>
            <div class="form-group">
                <label for="description">Job Description</label>
                <textarea id="description" name="description" rows="5">{{ job.description if job else '' }}</textarea>
            </div>
            <div class="form-group">
                <label for="required_skills">Required Skills</label>
                <input type="text" id="required_skills" name="required_skills" value="{{ job.required_skills if job else '' }}" placeholder="e.g. Python, SQL, Communication">
            </div>
            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" value="{{ job.location if job else '' }}">
            </div>
            <div class="form-group">
                <label for="job_type">Job Type</label>
                <input type="text" id="job_type" name="job_type" value="{{ job.job_type if job else '' }}" placeholder="e.g. Full-time, Part-time, Internship">
            </div>
            <div class="form-group">
                <label for="category_id">Category</label>
                <select id="category_id" name="category_id">
                    <option value="">-- Select --</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}" {{ 'selected' if job and job.category_id == cat.id else '' }}>{{ cat.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn-primary">Create Job</button>
        </form>
    </div>
</div>
<a href="{{ url_for('recruiter_jobs') }}">Back to Jobs</a>
{% endblock %}
