{% extends "base.html" %}

{% block title %}{{ 'Edit' if company else 'Add' }} Company - Admin - Job Board & Career Portal{% endblock %}

{% block content %}
<h1>{{ 'Edit' if company else 'Add' }} Company</h1>

<div class="card">
    <div class="card-body">
        <form class="auth-form" method="POST" action="{{ url_for('admin_company_edit', id=company.id) if company else url_for('admin_company_create') }}">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" value="{{ company.name if company else '' }}" required>
            </div>
            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" value="{{ company.location if company else '' }}">
            </div>
            <button type="submit" class="btn-primary">{{ 'Update' if company else 'Create' }}</button>
        </form>
    </div>
</div>
<a href="{{ url_for('admin_companies') }}">Back to Companies</a>
{% endblock %}
