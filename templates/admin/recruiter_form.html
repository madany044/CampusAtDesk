{% extends "base.html" %}

{% block title %}{{ 'Edit' if recruiter else 'Add' }} Recruiter - Admin - Job Board & Career Portal{% endblock %}

{% block content %}
<h1>{{ 'Edit' if recruiter else 'Add' }} Recruiter</h1>

<div class="card">
    <div class="card-body">
        <form class="auth-form" method="POST" action="{{ url_for('admin_recruiter_edit', id=recruiter.id) if recruiter else url_for('admin_recruiter_create') }}">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" value="{{ recruiter.username if recruiter else '' }}" required>
            </div>
            {% if not recruiter %}
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="form-group">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            {% endif %}
            <div class="form-group">
                <label for="company_id">Company</label>
                <select id="company_id" name="company_id">
                    <option value="">-- Select company --</option>
                    {% for c in companies %}
                    <option value="{{ c.id }}" {% if recruiter and recruiter.company_id == c.id %}selected{% endif %}>{{ c.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn-primary">{{ 'Update' if recruiter else 'Create' }}</button>
        </form>
    </div>
</div>
<a href="{{ url_for('admin_recruiters') }}">Back to Recruiters</a>
{% endblock %}
