{% extends "base.html" %}

{% block title %}{{ 'Edit' if category else 'Add' }} Category - Admin - Job Board & Career Portal{% endblock %}

{% block content %}
<h1>{{ 'Edit' if category else 'Add' }} Category</h1>

<div class="card">
    <div class="card-body">
        <form class="auth-form" method="POST" action="{{ url_for('admin_category_edit', id=category.id) if category else url_for('admin_category_create') }}">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" value="{{ category.name if category else '' }}" required>
            </div>
            <button type="submit" class="btn-primary">{{ 'Update' if category else 'Create' }}</button>
        </form>
    </div>
</div>
<a href="{{ url_for('admin_categories') }}">Back to Categories</a>
{% endblock %}
