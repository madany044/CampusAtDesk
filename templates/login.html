{% extends "base.html" %}

{% block title %}Sign In - Job Board & Career Portal{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>Sign in</h1>
        <form class="auth-form" method="POST" action="{{ url_for('login') }}">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ request.form.email if request.form else '' }}" required autocomplete="email">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-primary">Sign in</button>
        </form>
        <div class="auth-footer">
            <p>New to Job Board? <a href="{{ url_for('register') }}">Join now</a></p>
        </div>
    </div>
</div>
{% endblock %}
