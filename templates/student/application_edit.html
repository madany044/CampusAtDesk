{% extends "base.html" %}

{% block title %}Edit Application - Student - Job Board & Career Portal{% endblock %}

{% block content %}
<h1>Update Resume</h1>
<p>Application for: {{ application.job.title }}</p>

<div class="card">
    <div class="card-body">
        <form method="POST" action="{{ url_for('student_application_edit', id=application.id) }}" enctype="multipart/form-data">
            <div class="form-group">
                <label for="resume">New resume (PDF, DOC, DOCX)</label>
                <input type="file" id="resume" name="resume" accept=".pdf,.doc,.docx" required>
            </div>
            <button type="submit" class="btn-primary">Update Resume</button>
        </form>
    </div>
</div>
<a href="{{ url_for('student_applications') }}">Back to Applications</a>
{% endblock %}
